name: main

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"

permissions:
  contents: read
  id-token: write   # REQUIRED for GitHub OIDC

jobs:
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Pytest + coverage
        run: |
          pytest -q --disable-warnings --maxfail=1 \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  deploy-dev:
    name: Deploy Dev (OIDC)
    runs-on: ubuntu-latest
    needs: test
    environment: development

    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Auth check
        run: |
          databricks current-user me

      - name: Bundle validate/deploy/run
        run: |
          databricks bundle validate -t dev
          databricks bundle deploy -t dev
          databricks bundle run ingestion_job -t dev

  deploy-prod:
    name: Deploy Prod (OIDC)
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production

    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Bundle deploy/run
        run: |
          databricks bundle deploy -t prod
          databricks bundle run ingestion_job -t prod