bundle:
  name: Databricks-Analytics-Pipeline

variables:
  node_type_id:
    default: Standard_D4as_v5

include:
  - resources/*.yml

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    variables:
      node_type_id: Standard_D4as_v5

  prod:
    mode: production
    variables:
      node_type_id: Standard_E4as_v5